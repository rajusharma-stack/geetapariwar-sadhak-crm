app = "geetapariwar-sadhak"

primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3201
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "geetapariwar_data"
  destination = "/data"

[env]
  GEETAPARIWAR_DATA_DIR = "/data"
  SECRET_KEY = "change-this-to-a-random-secret-key"

[experimental]
  auto_rollback = true
